server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. 루트 접속 시 /OverseasPortal/ 로 자동 리다이렉트 (404 방지)
    location = / {
        return 302 /OverseasPortal/;
    }

    # 2. /OverseasPortal 서브패스 라우팅 및 정적 파일
    location /OverseasPortal/ {
        try_files $uri $uri/ /OverseasPortal/index.html;
    }

    # 3. 백엔드 API 프록시 (경로 보존)
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
